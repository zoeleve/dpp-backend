global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'dpp-backend'
    scrape_interval: 5s
    static_configs:
      - targets: ['backend:8000']
        labels:
          app_name: "dpp-backend"

  - job_name: 'node-exporter'
    scrape_interval: 5s
    static_configs:
      - targets: ['node-exporter:9100']

version: '3.8'

services:
  # 1. PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: dpp_user
      POSTGRES_PASSWORD: dpp_password
      POSTGRES_DB: dpp_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck: # Health check to ensure DB is ready before backend starts
      test: ["CMD-SHELL", "pg_isready -U dpp_user -d dpp_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Apache Jena Fuseki Service (Semantic Store)
  fuseki:
    image: stain/jena-fuseki:latest
    restart: always
    ports:
      - "3030:3030" # Expose the Fuseki port to the host
    volumes:
      # Persistent storage for the RDF data
      - fuseki_data:/jena/databases
    environment:
      # Name the dataset as required in your settings
      FUSEKI_DATASET_NAME: dpp_dataset
    command: ["/jena/fuseki-server", "--update", "--dataset=/jena/databases/${FUSEKI_DATASET_NAME}", "--port=3030"]

  # 3. FastAPI Backend Service (Your Application)
  backend:
    build: . # Builds the application using the Dockerfile in the current directory
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy # Wait for PostgreSQL to be ready
      fuseki:
        condition: service_started # Wait for Fuseki to start
    env_file:
      - .env # Load environment variables from the .env file

volumes:
  postgres_data:
  fuseki_data: